<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/inventario.css">
</head>
<body>
      <div class="container">
        <h2>Formulario de Inventario</h2>

        <form>
            <label for="codigo">Codigo_Producto</label>
            <input type="text" id="codigo" name="codigo">

            <label for="nombre">Nombre_Producto</label>
            <input type="text" id="nombre" name="nombre">

            <label for="cantidad">Cantidad_Producto</label>
            <input type="number" id="cantidad" name="cantidad">

            <label for="descripcion">Descripcion_Producto</label>
            <textarea id="descripcion" name="descripcion"></textarea>

            <label for="marca">Marca_Producto</label>
            <input type="text" id="marca" name="marca">

            <label for="valor">Valor_Unitario</label>
            <input type="number" id="valor" name="valor">

            <label for="categoria">Categoria_Productos</label>
            <input type="text" id="categoria" name="categoria">

            <label for="ubicacion">Ubicacion_producto</label>
            <input type="text" id="ubicacion" name="ubicacion">

            <button type="submit">Guardar Producto</button>
        </form>
    </div>

</body>
    
</body>
</html>
